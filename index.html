<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Adopción de Gatos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    header {
      background-color: #ff914d;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background-color: white;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h2 {
      margin: 10px 0;
    }

    .card p {
      padding: 0 10px;
      font-size: 14px;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 10px 15px;
      background-color: #ff914d;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .btn:hover {
      background-color: #e67e3c;
    }
  </style>
</head>
<body>

  <header>
    <h1>🐱 Adopción de Gatos</h1>
    <p>Dales un hogar lleno de amor</p>
  </header>

  <div class="container">

    <div class="card">
      <img src="https://cdn2.thecatapi.com/images/MTY3ODIyMQ.jpg">
      <h2>Milo</h2>
      <p>Juguetón y muy cariñoso. Ideal para familias.</p>
      <a href="#" class="btn">Adoptar</a>
    </div>

    <div class="card">
      <img src="https://cdn2.thecatapi.com/images/MTY3ODIyNA.jpg">
      <h2>Luna</h2>
      <p>Tranquila y dulce. Le encanta dormir al sol.</p>
      <a href="#" class="btn">Adoptar</a>
    </div>

    <div class="card">
      <img src="https://cdn2.thecatapi.com/images/MTY3ODIyNw.jpg">
      <h2>Simba</h2>
      <p>Curioso y aventurero. Siempre explorando.</p>
      <a href="#" class="btn">Adoptar</a>
    </div>

  </div>

</body>
</html>
